name: build-and-release

on:
  push:
    branches: [main]
    tags: ['v*', '[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build linux binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out="dist/prometheus-folder-size-exporter_linux_${GOARCH}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" .
          (cd dist && tar -czf "$(basename "$out").tar.gz" "$(basename "$out")")
          sha256sum dist/*.tar.gz > dist/SHA256SUMS_${GOARCH}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Consolidate checksums
        run: |
          cd dist
          cat SHA256SUMS_*.txt > SHA256SUMS.txt
          rm SHA256SUMS_*.txt
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
